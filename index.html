<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>Vocabulary</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon-192.png" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <style>
    :root {
      --bg: #ffffff;
      --paper: #ffffff;
      --soft: #f7f7f5;
      --soft-2: #f1f1ef;
      --text: #202020;
      --muted: #6f6f68;
      --faint: #9b9a93;
      --line: #e7e6e1;
      --line-strong: #d9d8d2;
      --accent: #2f2f2f;
      --danger: #b3261e;
      --radius: 14px;
      --shadow: 0 1px 2px rgba(15, 15, 15, .035);
      --shadow-hover: 0 2px 8px rgba(15, 15, 15, .055);
      --font: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      line-height: 1.45;
    }

    button, input, textarea { font: inherit; }
    button { -webkit-tap-highlight-color: transparent; }
    a { color: inherit; }

    .app {
      width: min(920px, 100%);
      margin: 0 auto;
      padding: 28px 18px 48px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0;
      font-size: clamp(32px, 8vw, 54px);
      letter-spacing: -0.05em;
      line-height: .95;
      font-weight: 720;
    }

    .app-logo {
      display: block;
      width: min(360px, 72vw);
      height: auto;
      object-fit: contain;
    }

    .install-btn {
      display: none;
      border: 1px solid var(--line);
      background: var(--paper);
      color: var(--text);
      border-radius: 999px;
      padding: 9px 13px;
      font-size: 13px;
      box-shadow: var(--shadow);
    }
    .install-btn.visible { display: inline-flex; }

    .composer {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--paper);
      padding: 14px;
      box-shadow: var(--shadow);
      margin-bottom: 18px;
    }

    .composer-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .composer-title {
      margin: 0;
      font-size: 16px;
      letter-spacing: -0.015em;
      font-weight: 650;
    }

    .hint {
      color: var(--muted);
      font-size: 12.5px;
      margin: 0;
    }

    .manual-term {
      width: 100%;
      min-height: 46px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--soft);
      color: var(--text);
      padding: 0 13px;
      outline: none;
      margin-bottom: 10px;
      font-size: 15px;
    }
    .manual-term:focus {
      background: var(--paper);
      border-color: var(--line-strong);
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .btn {
      border: 1px solid var(--line-strong);
      border-radius: 12px;
      background: var(--paper);
      color: var(--text);
      padding: 12px 14px;
      min-height: 46px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-weight: 620;
      cursor: pointer;
      transition: background .16s ease, border-color .16s ease, transform .12s ease;
    }
    .btn:active { transform: scale(.99); }
    .btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .btn:hover { background: var(--soft); }
    .btn.primary:hover { background: #111; }
    .btn svg { width: 18px; height: 18px; flex: 0 0 auto; }
    .btn.primary svg { stroke: currentColor; }
    .btn-icon-img {
      width: 28px;
      height: 28px;
      object-fit: contain;
      flex: 0 0 auto;
      display: block;
    }

    .status {
      margin-top: 12px;
      color: var(--muted);
      font-size: 13px;
    }
    .status:empty { display: none; }

    .tools {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 22px 0 12px;
    }

    .search {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--soft);
      color: var(--text);
      padding: 0 13px;
      outline: none;
    }
    .search:focus {
      background: var(--paper);
      border-color: var(--line-strong);
    }

    .section-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 10px 0;
    }
    h2 {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
      letter-spacing: .02em;
      text-transform: uppercase;
    }
    .count {
      color: var(--faint);
      font-size: 12px;
    }

    .list {
      display: grid;
      gap: 10px;
    }

    .empty {
      border: 1px dashed var(--line-strong);
      border-radius: var(--radius);
      color: var(--muted);
      background: var(--soft);
      padding: 22px;
      text-align: center;
      font-size: 14px;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--paper);
      padding: 12px 13px;
      box-shadow: var(--shadow);
      transition: background .16s ease, border-color .16s ease;
    }
    .card:hover { border-color: var(--line-strong); box-shadow: var(--shadow-hover); }

    .card-term-line {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      min-height: 28px;
    }
    .term-toggle {
      flex: 1 1 auto;
      min-width: 0;
      width: 100%;
      border: 0;
      background: transparent;
      color: var(--text);
      text-align: left;
      padding: 0;
      cursor: pointer;
      font: inherit;
    }
    .term {
      font-size: 18px;
      font-weight: 680;
      letter-spacing: -0.018em;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }

    .card-top-actions {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      flex: 0 0 auto;
    }

    .action-line {
      margin-top: 2px;
      padding-top: 10px;
      border-top: 1px solid var(--line);
      display: flex;
      gap: 6px;
      align-items: center;
      justify-content: flex-start;
      flex-wrap: wrap;
    }

    .site-btn {
      min-width: 34px;
      height: 32px;
      padding: 0 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 0;
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      text-decoration: none;
      font-size: 11px;
      font-weight: 750;
      line-height: 1;
    }
    .site-btn:hover { background: var(--soft-2); color: var(--text); }
    .site-btn svg { width: 18px; height: 18px; display: block; }
    .site-btn .wordmark { letter-spacing: -0.03em; display: inline-flex; align-items: center; }
    .wordmark .you { color: #111; }
    .wordmark .glish { margin-left: 1px; color: #fff; background: #d7262d; border-radius: 3px; padding: 3px 4px 3px 3px; }
    .brand-gpt { display: inline-flex; align-items: center; gap: 6px; }
    .brand-gpt svg { width: 18px; height: 18px; }

    .ipa {
      color: var(--muted);
      font-size: 13.5px;
      letter-spacing: .01em;
    }
    .translation {
      color: var(--text);
      font-size: 14.5px;
      overflow-wrap: anywhere;
    }

    .icon-btn {
      width: 32px;
      height: 32px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 0;
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
    }
    .icon-btn:hover { background: var(--soft-2); color: var(--text); }
    .icon-btn svg { width: 19px; height: 19px; stroke: currentColor; }
    .icon-btn.active { color: var(--text); }
    .card-term-line .expand-btn { flex: 0 0 auto; margin-left: 6px; }
    .expand-btn svg { transition: transform .14s ease; }
    .card.is-expanded .expand-btn svg { transform: rotate(180deg); }
    .icon-btn.danger:hover { color: var(--danger); background: #fdf0ee; }

    .card-expanded {
      margin-top: 12px;
      border-top: 1px solid var(--line);
      padding-top: 12px;
      display: grid;
      gap: 10px;
      animation: expandIn .12s ease-out;
    }
    @keyframes expandIn {
      from { opacity: 0; transform: translateY(-2px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .expanded-title {
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
      letter-spacing: -0.005em;
    }
    .details-body {
      display: grid;
      gap: 10px;
      color: var(--text);
      font-size: 14px;
    }
    .label {
      color: var(--faint);
      font-size: 11.5px;
      font-weight: 650;
      letter-spacing: .03em;
      text-transform: uppercase;
      margin-bottom: 3px;
    }
    .value { white-space: pre-wrap; overflow-wrap: anywhere; }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }
    .link-chip {
      text-decoration: none;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--muted);
      font-size: 12.5px;
      background: var(--paper);
    }
    .link-chip:hover { background: var(--soft); color: var(--text); }

    .toast {
      position: fixed;
      left: 50%;
      bottom: max(18px, env(safe-area-inset-bottom));
      transform: translateX(-50%) translateY(10px);
      opacity: 0;
      pointer-events: none;
      background: #202020;
      color: white;
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 13px;
      max-width: min(92vw, 520px);
      box-shadow: 0 12px 26px rgba(0,0,0,.16);
      transition: opacity .18s ease, transform .18s ease;
      z-index: 50;
      text-align: center;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      display: none;
      align-items: flex-end;
      justify-content: center;
      background: rgba(0,0,0,.18);
      padding: 16px;
      z-index: 40;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      width: min(640px, 100%);
      max-height: min(88vh, 780px);
      overflow: auto;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: 0 20px 50px rgba(0,0,0,.18);
      padding: 16px;
    }
    .modal-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    .modal h3 { margin: 0; font-size: 18px; letter-spacing: -0.02em; }
    .close-btn {
      border: 0;
      background: var(--soft);
      border-radius: 10px;
      width: 34px;
      height: 34px;
      cursor: pointer;
    }
    .field-grid { display: grid; gap: 10px; }
    label.field span {
      display: block;
      margin-bottom: 5px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }
    input.field-input, textarea.field-input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 11px 12px;
      background: var(--soft);
      color: var(--text);
      outline: none;
    }
    textarea.field-input { min-height: 74px; resize: vertical; }
    textarea.long { min-height: 150px; }
    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 14px;
      flex-wrap: wrap;
    }
    .modal-actions .btn { min-height: 40px; padding: 9px 12px; }

    @media (max-width: 560px) {
      .app { padding: 24px 14px 40px; }
      .actions { grid-template-columns: 1fr 1fr; gap: 8px; }
      .composer-head { display: block; }
      .btn { padding-inline: 10px; font-size: 14px; }
      .card { padding: 12px; }
      .action-line { margin-left: -3px; }
      .app-logo { width: min(320px, 78vw); }
      .modal-backdrop { align-items: flex-end; padding: 0; }
      .modal { border-radius: 18px 18px 0 0; max-height: 92vh; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <h1>Vocabulary</h1>
      <button id="installBtn" class="install-btn">Install</button>
    </header>

    <section class="composer" aria-labelledby="new-entry-title">
      <div class="composer-head">
        <h2 id="new-entry-title" class="composer-title">New entry</h2>
      </div>
      <input id="manualTerm" class="manual-term" type="text" placeholder="Type a term or expression" autocomplete="off" inputmode="text" />
      <div class="actions">
        <button id="askGptBtn" class="btn primary"><img class="btn-icon-img" src="gpt-icon.png?v=13.1" alt="" aria-hidden="true" />GPT</button>
        <button id="pasteResponseBtn" class="btn"><svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M9 4h6l1 2h2a1.5 1.5 0 0 1 1.5 1.5v11A1.5 1.5 0 0 1 18 20H6a1.5 1.5 0 0 1-1.5-1.5v-11A1.5 1.5 0 0 1 6 6h2l1-2Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M9 6h6M8 11h8M8 15h8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>Paste response</button>
      </div>
      <div id="status" class="status"></div>
    </section>

    <div class="tools">
      <input id="search" class="search" type="search" placeholder="Search saved words" autocomplete="off" />
    </div>

    <div class="section-row">
      <h2>Saved words</h2>
      <span id="count" class="count">0 saved</span>
    </div>

    <section id="list" class="list" aria-live="polite"></section>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <div id="editModal" class="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="editTitle">
    <div class="modal">
      <div class="modal-head">
        <h3 id="editTitle">Edit card</h3>
        <button id="closeEditBtn" class="close-btn" aria-label="Close">✕</button>
      </div>
      <div class="field-grid">
        <label class="field"><span>Term</span><input id="editTerm" class="field-input" /></label>
        <label class="field"><span>IPA</span><input id="editIpa" class="field-input" placeholder="/ˈlɪvliˌhʊd/" /></label>
        <label class="field"><span>Translation</span><textarea id="editTranslation" class="field-input"></textarea></label>
        <label class="field"><span>Definition</span><textarea id="editDefinition" class="field-input"></textarea></label>
        <label class="field"><span>Example</span><textarea id="editExample" class="field-input" placeholder="English example.
Tradução do exemplo."></textarea></label>
        <label class="field"><span>Note</span><textarea id="editNote" class="field-input"></textarea></label>
      </div>
      <div class="modal-actions">
        <button id="cancelEditBtn" class="btn">Cancel</button>
        <button id="saveEditBtn" class="btn primary">Save</button>
      </div>
    </div>
  </div>

  <div id="pasteModal" class="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="pasteTitle">
    <div class="modal">
      <div class="modal-head">
        <h3 id="pasteTitle">Paste GPT response</h3>
        <button id="closePasteBtn" class="close-btn" aria-label="Close">✕</button>
      </div>
      <label class="field">
        <span>Response text</span>
        <textarea id="manualPasteText" class="field-input long" placeholder="TERM:&#10;...&#10;&#10;IPA:&#10;/.../&#10;&#10;TRANSLATION:&#10;...&#10;&#10;DEFINITION:&#10;...&#10;&#10;EXAMPLE:&#10;English example.&#10;Tradução do exemplo.&#10;&#10;NOTE:&#10;Nota em português."></textarea>
      </label>
      <div class="modal-actions">
        <button id="cancelPasteBtn" class="btn">Cancel</button>
        <button id="savePasteBtn" class="btn primary">Save card</button>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'words-pwa-v3-items';
    const $ = (id) => document.getElementById(id);

    let items = [];
    const expandedIds = new Set();
    let editingId = null;
    let deferredInstallPrompt = null;

    const els = {
      manualTerm: $('manualTerm'),
      askGptBtn: $('askGptBtn'),
      pasteResponseBtn: $('pasteResponseBtn'),
      status: $('status'),
      search: $('search'),
      list: $('list'),
      count: $('count'),
      toast: $('toast'),
      installBtn: $('installBtn'),
      editModal: $('editModal'),
      closeEditBtn: $('closeEditBtn'),
      cancelEditBtn: $('cancelEditBtn'),
      saveEditBtn: $('saveEditBtn'),
      editTerm: $('editTerm'),
      editIpa: $('editIpa'),
      editTranslation: $('editTranslation'),
      editDefinition: $('editDefinition'),
      editExample: $('editExample'),
      editNote: $('editNote'),
      pasteModal: $('pasteModal'),
      closePasteBtn: $('closePasteBtn'),
      cancelPasteBtn: $('cancelPasteBtn'),
      savePasteBtn: $('savePasteBtn'),
      manualPasteText: $('manualPasteText')
    };

    function normalizeItem(raw) {
      const term = raw.term || raw.word || raw.phrase || '';
      return {
        id: raw.id || crypto.randomUUID(),
        term: term.trim(),
        ipa: (raw.ipa || raw.pronunciation || '').trim(),
        translation: (raw.translation || '').trim(),
        definition: (raw.definition || '').trim(),
        example: (raw.example || raw.examples || '').trim(),
        note: (raw.note || raw.notes || '').trim(),
        favorite: Boolean(raw.favorite),
        updatedAt: raw.updatedAt || new Date().toISOString()
      };
    }

    function loadItems() {
      try {
        const stored = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        items = Array.isArray(stored) ? stored.map(normalizeItem).filter(i => i.term) : [];
      } catch {
        items = [];
      }
      render();
    }

    function persist() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
      render();
    }

    function setStatus(message) { els.status.textContent = message; }

    function toast(message) {
      els.toast.textContent = message;
      els.toast.classList.add('show');
      clearTimeout(toast.timer);
      toast.timer = setTimeout(() => els.toast.classList.remove('show'), 2400);
    }

    async function readClipboardText() {
      if (!navigator.clipboard?.readText) throw new Error('Clipboard is not available.');
      return (await navigator.clipboard.readText() || '').trim();
    }

    async function writeClipboardText(text) {
      if (!navigator.clipboard?.writeText) return false;
      await navigator.clipboard.writeText(text);
      return true;
    }

    function cleanTerm(text) {
      return String(text || '')
        .replace(/```[\s\S]*?```/g, ' ')
        .replace(/https?:\/\/\S+/g, ' ')
        .replace(/\s+/g, ' ')
        .trim()
        .slice(0, 160);
    }

    function buildGptPrompt(term) {
      return `Create one English vocabulary card for a Brazilian Portuguese speaker.

TERM:
${term}

Requirements:
- Use natural American English.
- If the term is an expression, explain the expression as a whole, not word by word.
- IPA must be American English pronunciation.
- Translation must be in natural Brazilian Portuguese.
- Definition must be simple, natural English.
- Example must sound like something an American would actually say in real life.
- Put the Brazilian Portuguese translation of the example directly below the English example, inside the EXAMPLE field.
- Note must be in Brazilian Portuguese and should be more detailed than usual. Include practical usage tips, common situations, nuance, register (formal/informal), whether it is a phrasal verb, idiom, collocation, or false cognate when relevant, common mistakes Brazilian learners make, pronunciation warnings, and differences from similar words or expressions when useful.
- In the NOTE, always include a short "Passado:" explanation when the term can function as a verb, phrasal verb, or action expression. Give the natural past form and a pronunciation tip for the past form, especially for -ed endings (/t/, /d/, or /ɪd/) or irregular forms. If the term is not normally used as a verb, do not force an unnatural past form.
- Keep the note useful for a Brazilian learner who wants to understand how native speakers actually use the term.

Return ONLY this exact format. Do not add markdown, bullets, or extra explanation.

TERM:
${term}

IPA:
/.../

TRANSLATION:
...

DEFINITION:
...

EXAMPLE:
English example sentence.
Tradução natural em português do exemplo.

NOTE:
Nota em português com dicas práticas, explicações adicionais, alertas de uso e, quando aplicável, uma seção curta “Passado:” com a forma no passado e uma dica de pronúncia do passado.`;
    }

    async function askGptFromClipboard() {
      let term = cleanTerm(els.manualTerm.value);
      if (!term) {
        try {
          term = cleanTerm(await readClipboardText());
        } catch {
          term = cleanTerm(prompt('Paste or type the English term:') || '');
        }
      }
      if (!term) return toast('Type a term or copy one first.');

      const promptText = buildGptPrompt(term);
      try { await writeClipboardText(promptText); } catch {}

      setStatus(`Prompt ready for “${term}”. Paste it in ChatGPT, then copy the answer and come back.`);

      if (navigator.share) {
        try {
          await navigator.share({ title: `Vocabulary: ${term}`, text: promptText });
          toast('Prompt shared. Copy the GPT answer when it is ready.');
          return;
        } catch {
          // Continue to browser fallback.
        }
      }

      toast('Prompt copied. Opening ChatGPT.');
      const url = `https://chatgpt.com/?q=${encodeURIComponent(promptText)}`;
      try { window.open(url, '_blank', 'noopener'); }
      catch { window.location.href = 'https://chatgpt.com/'; }
    }

    function stripCodeFences(text) {
      return String(text || '')
        .replace(/^\s*```(?:text|txt|markdown)?\s*/i, '')
        .replace(/\s*```\s*$/i, '')
        .trim();
    }

    function getField(text, labels) {
      const allLabels = [
        'TERM', 'WORD', 'PHRASE', 'IPA', 'PRONUNCIATION', 'TRANSLATION', 'DEFINITION', 'MEANING', 'EXAMPLE', 'EXAMPLES', 'NOTE', 'NOTES'
      ];
      const labelPattern = labels.map(escapeRegExp).join('|');
      const allPattern = allLabels.map(escapeRegExp).join('|');
      const re = new RegExp(`^\\s*(?:${labelPattern})\\s*:\\s*([\\s\\S]*?)(?=^\\s*(?:${allPattern})\\s*:|\\s*$)`, 'im');
      const match = text.match(re);
      return match ? match[1].trim() : '';
    }

    function escapeRegExp(str) {
      return String(str).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    function parseGptResponse(text) {
      const clean = stripCodeFences(text);
      const term = getField(clean, ['TERM', 'WORD', 'PHRASE']);
      const ipa = getField(clean, ['IPA', 'PRONUNCIATION']);
      const translation = getField(clean, ['TRANSLATION']);
      const definition = getField(clean, ['DEFINITION', 'MEANING']);
      const example = getField(clean, ['EXAMPLE', 'EXAMPLES']);
      const note = getField(clean, ['NOTE', 'NOTES']);
      return { term, ipa, translation, definition, example, note };
    }

    function saveParsedCard(parsed) {
      const card = normalizeItem({
        id: crypto.randomUUID(),
        ...parsed,
        updatedAt: new Date().toISOString()
      });
      if (!card.term) return false;

      const existingIndex = items.findIndex(i => i.term.toLowerCase() === card.term.toLowerCase());
      if (existingIndex >= 0) {
        card.favorite = items[existingIndex].favorite;
        card.id = items[existingIndex].id;
        items[existingIndex] = card;
      } else {
        items.unshift(card);
      }
      persist();
      setStatus(`Saved: ${card.term}`);
      toast(existingIndex >= 0 ? 'Card updated.' : 'Card saved.');
      return true;
    }

    async function pasteGptResponse() {
      try {
        const text = await readClipboardText();
        const parsed = parseGptResponse(text);
        if (!parsed.term || (!parsed.translation && !parsed.definition && !parsed.example)) {
          openPasteModal(text);
          toast('Check the format before saving.');
          return;
        }
        saveParsedCard(parsed);
      } catch {
        openPasteModal('');
      }
    }

    function openPasteModal(text = '') {
      els.manualPasteText.value = text;
      els.pasteModal.classList.add('open');
      setTimeout(() => els.manualPasteText.focus(), 50);
    }
    function closePasteModal() { els.pasteModal.classList.remove('open'); }

    function saveManualPaste() {
      const parsed = parseGptResponse(els.manualPasteText.value);
      if (!parsed.term) return toast('TERM is missing.');
      if (!parsed.translation && !parsed.definition && !parsed.example) return toast('The response needs more fields.');
      if (saveParsedCard(parsed)) closePasteModal();
    }

    function itemLinks(term) {
      const q = encodeURIComponent(term || 'english');
      return {
        youglish: `https://youglish.com/pronounce/${q}/english/us`,
        reverso: `https://context.reverso.net/translation/english-portuguese/${q}`
      };
    }

    function speak(text) {
      const term = (text || '').trim();
      if (!term) return;
      if (!('speechSynthesis' in window)) return toast('Audio is not available in this browser.');
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(term);
      utterance.lang = 'en-US';
      utterance.rate = .88;
      const voices = window.speechSynthesis.getVoices?.() || [];
      utterance.voice = voices.find(v => /en[-_]US/i.test(v.lang)) || voices.find(v => /^en/i.test(v.lang)) || null;
      window.speechSynthesis.speak(utterance);
    }

    function toggleExpanded(id) {
      if (expandedIds.has(id)) expandedIds.delete(id);
      else expandedIds.add(id);
      render();
    }

    function toggleFavorite(id) {
      const item = items.find(i => i.id === id);
      if (!item) return;
      item.favorite = !item.favorite;
      persist();
    }

    function deleteItem(id) {
      const item = items.find(i => i.id === id);
      if (!item) return;
      if (!confirm(`Delete “${item.term}”?`)) return;
      items = items.filter(i => i.id !== id);
      persist();
      toast('Deleted.');
    }

    function openEdit(id) {
      const item = items.find(i => i.id === id);
      if (!item) return;
      editingId = id;
      els.editTerm.value = item.term || '';
      els.editIpa.value = item.ipa || '';
      els.editTranslation.value = item.translation || '';
      els.editDefinition.value = item.definition || '';
      els.editExample.value = item.example || '';
      els.editNote.value = item.note || '';
      els.editModal.classList.add('open');
      setTimeout(() => els.editTerm.focus(), 50);
    }

    function closeEdit() {
      editingId = null;
      els.editModal.classList.remove('open');
    }

    function saveEdit() {
      const index = items.findIndex(i => i.id === editingId);
      if (index < 0) return closeEdit();
      const term = els.editTerm.value.trim();
      if (!term) return toast('Term is required.');
      items[index] = normalizeItem({
        ...items[index],
        term,
        ipa: els.editIpa.value,
        translation: els.editTranslation.value,
        definition: els.editDefinition.value,
        example: els.editExample.value,
        note: els.editNote.value,
        updatedAt: new Date().toISOString()
      });
      persist();
      closeEdit();
      toast('Saved.');
    }

    function normalizeSearch(text) {
      return String(text || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
    }

    function render() {
      const query = normalizeSearch(els.search.value);
      const favs = items.filter(i => i.favorite);
      const ordered = [...items].sort((a, b) => {
        if (a.favorite !== b.favorite) return a.favorite ? -1 : 1;
        return (b.updatedAt || '').localeCompare(a.updatedAt || '');
      });
      const filtered = ordered.filter(item => {
        if (!query) return true;
        return normalizeSearch(`${item.term} ${item.ipa} ${item.translation} ${item.definition} ${item.example} ${item.note}`).includes(query);
      });

      els.count.textContent = `${items.length} saved${favs.length ? ` · ${favs.length} favorite${favs.length === 1 ? '' : 's'}` : ''}`;

      if (!filtered.length) {
        els.list.innerHTML = `<div class="empty">No saved words yet.</div>`;
        return;
      }

      els.list.innerHTML = filtered.map(item => {
        const links = itemLinks(item.term);
        const detailsContent = [
          item.definition ? `<div><div class="label">Definition</div><div class="value">${escapeHtml(item.definition)}</div></div>` : '',
          item.example ? `<div><div class="label">Example</div><div class="value">${escapeHtml(item.example)}</div></div>` : '',
          item.note ? `<div><div class="label">Note</div><div class="value">${escapeHtml(item.note)}</div></div>` : ''
        ].filter(Boolean).join('');

        const isExpanded = expandedIds.has(item.id);
        const bottomActions = `
          <div class="action-line" aria-label="Card actions">
            <a class="site-btn" href="${escapeAttr(links.youglish)}" target="_blank" rel="noopener" title="YouGlish" aria-label="Open in YouGlish"><span class="wordmark"><span class="you">You</span><span class="glish">Glish</span></span></a>
            <a class="site-btn" href="${escapeAttr(links.reverso)}" target="_blank" rel="noopener" title="Reverso Context" aria-label="Open in Reverso Context"><svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M7.5 8.5A5.7 5.7 0 0 1 17 6.8l1.5 1.5" stroke="#1f6fb2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M18.5 4.8v3.5H15" stroke="#1f6fb2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M16.5 15.5A5.7 5.7 0 0 1 7 17.2l-1.5-1.5" stroke="#d4242c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M5.5 19.2v-3.5H9" stroke="#d4242c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></a>
            <button class="icon-btn ${item.favorite ? 'active' : ''}" data-action="favorite" data-id="${escapeAttr(item.id)}" title="Favorite" aria-label="Favorite"><svg viewBox="0 0 24 24" fill="${item.favorite ? 'currentColor' : 'none'}" aria-hidden="true"><path d="m12 3.8 2.4 4.9 5.4.8-3.9 3.8.9 5.4-4.8-2.5-4.8 2.5.9-5.4-3.9-3.8 5.4-.8L12 3.8Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg></button>
            <button class="icon-btn" data-action="edit" data-id="${escapeAttr(item.id)}" title="Edit" aria-label="Edit"><svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M4.5 19.5h4.1L19 9.1a2.1 2.1 0 0 0 0-3l-1.1-1.1a2.1 2.1 0 0 0-3 0L4.5 15.4v4.1Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M13.8 6.2l4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg></button>
            <button class="icon-btn danger" data-action="delete" data-id="${escapeAttr(item.id)}" title="Delete" aria-label="Delete"><svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M5 7h14M9 7V5.5A1.5 1.5 0 0 1 10.5 4h3A1.5 1.5 0 0 1 15 5.5V7m2 0-.6 12a1.5 1.5 0 0 1-1.5 1.4H9.1A1.5 1.5 0 0 1 7.6 19L7 7m3.2 3.5v6m3.6-6v6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
          </div>
        `;
        const expandedContent = isExpanded ? `
          <div class="card-expanded">
            ${item.ipa ? `<div class="ipa">${escapeHtml(item.ipa)}</div>` : ''}
            ${item.translation ? `<div class="translation">${escapeHtml(item.translation)}</div>` : ''}
            ${detailsContent ? `<div class="expanded-title">Definition & examples</div><div class="details-body">${detailsContent}</div>` : ''}
            ${bottomActions}
          </div>
        ` : '';

        return `
          <article class="card ${isExpanded ? 'is-expanded' : ''}">
            <div class="card-term-line">
              <button class="term-toggle" data-action="toggle" data-id="${escapeAttr(item.id)}" aria-expanded="${isExpanded ? 'true' : 'false'}" title="Open details">
                <div class="term">${escapeHtml(item.term)}</div>
              </button>
              <div class="card-top-actions">
                <button class="icon-btn" data-action="speak" data-id="${escapeAttr(item.id)}" title="Audio" aria-label="Audio"><svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M5 9.5v5h3.2L13 18V6L8.2 9.5H5Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M16 9c.8.8 1.2 1.8 1.2 3s-.4 2.2-1.2 3M18.7 6.8A7.2 7.2 0 0 1 21 12a7.2 7.2 0 0 1-2.3 5.2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg></button>
                <button class="icon-btn expand-btn" data-action="toggle" data-id="${escapeAttr(item.id)}" title="${isExpanded ? 'Collapse details' : 'Expand details'}" aria-label="${isExpanded ? 'Collapse details' : 'Expand details'}" aria-expanded="${isExpanded ? 'true' : 'false'}"><svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="m6.5 9 5.5 5.5L17.5 9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
              </div>
            </div>
            ${expandedContent}
          </article>
        `;
      }).join('');
    }

    function escapeHtml(str) {
      return String(str || '').replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
    }
    function escapeAttr(str) { return escapeHtml(str).replace(/'/g, '&#39;'); }

    function bindEvents() {
      els.askGptBtn.addEventListener('click', askGptFromClipboard);
      els.pasteResponseBtn.addEventListener('click', pasteGptResponse);
      els.manualTerm.addEventListener('keydown', (e) => { if (e.key === 'Enter') askGptFromClipboard(); });
      els.search.addEventListener('input', render);
      els.list.addEventListener('click', (event) => {
        const btn = event.target.closest('[data-action]');
        if (!btn) return;
        const { action, id } = btn.dataset;
        const item = items.find(i => i.id === id);
        if (action === 'toggle') toggleExpanded(id);
        if (action === 'favorite') toggleFavorite(id);
        if (action === 'speak' && item) speak(item.term);
        if (action === 'edit') openEdit(id);
        if (action === 'delete') deleteItem(id);
      });

      els.closeEditBtn.addEventListener('click', closeEdit);
      els.cancelEditBtn.addEventListener('click', closeEdit);
      els.saveEditBtn.addEventListener('click', saveEdit);
      els.editModal.addEventListener('click', (e) => { if (e.target === els.editModal) closeEdit(); });

      els.closePasteBtn.addEventListener('click', closePasteModal);
      els.cancelPasteBtn.addEventListener('click', closePasteModal);
      els.savePasteBtn.addEventListener('click', saveManualPaste);
      els.pasteModal.addEventListener('click', (e) => { if (e.target === els.pasteModal) closePasteModal(); });

      window.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') { closeEdit(); closePasteModal(); }
      });

      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredInstallPrompt = e;
        els.installBtn.classList.add('visible');
      });
      els.installBtn.addEventListener('click', async () => {
        if (!deferredInstallPrompt) return;
        deferredInstallPrompt.prompt();
        await deferredInstallPrompt.userChoice;
        deferredInstallPrompt = null;
        els.installBtn.classList.remove('visible');
      });
    }

    async function registerServiceWorker() {
      if ('serviceWorker' in navigator) {
        try { await navigator.serviceWorker.register('./sw.js'); }
        catch { /* App still works without offline cache. */ }
      }
    }

    bindEvents();
    loadItems();
    registerServiceWorker();
  </script>
</body>
</html>
